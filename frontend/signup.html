<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PrismEdge AI | Create User</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="auth-page" data-auth-page="signup">
    <main class="auth-shell">
      <section class="auth-panel">
        <div>
          <p class="eyebrow">Create user</p>
          <h1>Create your PrismEdge account</h1>
          <p class="auth-copy">New users start as viewers unless your Firebase admin assigns analyst or admin custom claims.</p>
        </div>
        <form id="signupForm" class="auth-form">
          <label>
            <span>Name</span>
            <input name="name" type="text" autocomplete="name" required>
          </label>
          <label>
            <span>Email</span>
            <input name="email" type="email" autocomplete="email" required>
          </label>
          <label>
            <span>Password</span>
            <input name="password" type="password" autocomplete="new-password" minlength="6" required>
          </label>
          <label>
            <span>Confirm password</span>
            <input name="confirmPassword" type="password" autocomplete="new-password" minlength="6" required>
          </label>
          <button class="button" type="submit">Create account</button>
        </form>
        <p id="authMessage" class="auth-message" role="status" aria-live="polite"></p>
        <p class="auth-switch">Already have an account? <a href="login.html">Sign in</a></p>
      </section>
    </main>
    <script src="auth.js"></script>
  </body>
</html>
