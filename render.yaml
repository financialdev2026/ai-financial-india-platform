services:
  - type: web
    name: prismedge-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && PYTHONPATH=. uvicorn src.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: PYTHONUTF8
        value: "1"
      - key: GROQ_API_KEY
        sync: false
      - key: PRISMEDGE_AGENT_MODEL
        value: "llama-3.3-70b-versatile"
      - key: PRISMEDGE_AGENT_API_URL
        value: "https://api.groq.com/openai/v1/chat/completions"
      - key: MARKETAUX_API_KEY
        sync: false
    healthCheckPath: /health
    autoDeploy: true
